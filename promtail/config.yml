server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: nginx_access_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: nginx_access_logs
          __path__: /var/log/nginx/access.log

    pipeline_stages:
      - regex:
          expression: '^(?P<remote_addr>\S+) - \S+ \S+ \[(?P<time_local>[^\]]+)\] "(?P<method>\S+) (?P<request>[^ ]+) (?P<protocol>[^"]+)" (?P<status>\d{3}) (?P<body_bytes_sent>\d+) "(?P<http_referer>[^"]*)" "(?P<http_user_agent>[^"]*)"'
      - metrics:
          nginx_http_requests_total:
            type: Counter
            description: "Requests parsed from nginx access log"
            config:
              match_all: true
              action: inc
            labels:
              status: