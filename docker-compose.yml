version: '3'

services:
  prometheus:
    image: prom/prometheus
    ports:
      - 9090:9090
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    ports:
      - 3000:3000
    volumes:
      - ./grafana.db:/etc/grafana/grafana.db
      - ./grafana.ini:/etc/grafana/grafana.ini

  node-exporter:
    image: prom/node-exporter
    ports:
      - 9100:9100


  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4.2
    command:
      - -nginx.scrape-uri=http://nginx:80/stub_status
    ports:
      - "9101:9113"
    depends_on:
      - nginx

  promtail:
    image: grafana/promtail:3.0.0
    ports:
      - "9080:9080"
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - ./promtail/positions.yml:/tmp/positions.yml
      - ./nginx/logs:/var/log/nginx:ro
    depends_on:
      - nginx

  postgres:
    image: postgres:10
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=workshop
      - POSTGRES_PASSWORD=workshop
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  postgresql-exporter:
    image: wrouesnel/postgres_exporter
    ports:
      - 9187:9187
    environment:
      - DATA_SOURCE_NAME=postgresql://workshop:workshop@postgres:5432/workshop?sslmode=disable
      - PG_EXPORTER_EXTEND_QUERY_PATH=/custom-queries.yaml
    volumes:
      - ./custom-queries.yml:/custom-queries.yaml
    depends_on:
      - postgres

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
volumes:
  prometheus-data:
