server {
    listen 80;
    server_name localhost;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    location / {
        return 200 'nginx ok';
        add_header Content-Type text/plain;
    }

    location /notfound {
        return 404 'not found';
        add_header Content-Type text/plain;
    }

    location /error {
        return 500 'internal error';
        add_header Content-Type text/plain;
    }

    location /stub_status {
        stub_status;
        allow all;
    }
}